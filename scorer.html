<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cricket Scorer</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f1f5f9;min-height:100dvh}
.view{display:none}.view.active{display:block}
.btn-score{user-select:none;touch-action:manipulation;transition:all .1s;min-height:56px;display:flex;align-items:center;justify-content:center;font-weight:700;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.btn-score:active{transform:scale(.93);opacity:.8}
.btn-sm{min-height:44px;font-size:.875rem}
.ball-dot{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-size:12px;font-weight:700;color:#fff;margin:2px}
.ball-dot.run{background:#3b82f6}
.ball-dot.four{background:#8b5cf6}
.ball-dot.six{background:#ec4899}
.ball-dot.wicket{background:#ef4444}
.ball-dot.wide{background:#eab308;color:#000}
.ball-dot.noball{background:#f97316}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.xi-chip{display:inline-flex;align-items:center;gap:4px;background:#e0f2fe;color:#0369a1;border-radius:20px;padding:4px 12px;font-size:13px;margin:3px;cursor:pointer;border:1px solid #bae6fd;transition:all .1s}
.xi-chip.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.xi-chip.dim{opacity:.5}
select,input{border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:15px;width:100%;background:#fff}
select:focus,input:focus{outline:none;border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,.15)}
label{font-size:13px;font-weight:600;color:#374151;margin-bottom:2px;display:block}
.live-pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div class="max-w-lg mx-auto px-3 py-4 space-y-4" id="app">

<!-- ══ HOME ══ -->
<div id="view-home" class="view active">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900">Cricket Scorer</h1>
    <button onclick="showView('leaderboard')" class="bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm font-medium text-gray-700">Leaderboard</button>
  </div>
  <div id="home-match-list" class="space-y-2"></div>
  <button onclick="showView('setup')" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-semibold py-3 rounded-xl text-base shadow-sm active:scale-95 transition">+ New Match</button>
  <div class="text-center text-xs text-gray-400">Data saves in your browser (localStorage)</div>
</div>

<!-- ══ SETUP ══ -->
<div id="view-setup" class="view">
  <div class="flex items-center gap-2">
    <button onclick="showView('home')" class="text-cyan-600 font-medium text-sm">&larr; Back</button>
    <h2 class="text-xl font-bold text-gray-900">New Match</h2>
  </div>
  <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm space-y-3">
    <div><label>Match ID (optional)</label><input id="setup-mid" placeholder="Auto if blank" class="text-sm"></div>
    <div><label>Overs</label><select id="setup-overs"><option>4</option><option>5</option><option selected>6</option><option>7</option></select></div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label>Team A</label>
        <input id="setup-ta" placeholder="Name" class="text-sm">
        <div class="mt-2"><label class="text-xs">Players</label><select id="setup-na"><option>3</option><option>4</option><option>5</option><option>6</option><option selected>7</option><option>8</option><option>9</option><option>10</option><option>11</option></select></div>
      </div>
      <div>
        <label>Team B</label>
        <input id="setup-tb" placeholder="Name" class="text-sm">
        <div class="mt-2"><label class="text-xs">Players</label><select id="setup-nb"><option>3</option><option>4</option><option>5</option><option>6</option><option selected>7</option><option>8</option><option>9</option><option>10</option><option>11</option></select></div>
      </div>
    </div>
    <button onclick="startMatch()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 rounded-xl text-base shadow-sm active:scale-95 transition">Start Match</button>
    <div id="setup-err" class="text-xs text-red-500 text-center"></div>
  </div>
</div>

<!-- ══ SCORER ══ -->
<div id="view-scorer" class="view">
  <div class="flex items-center justify-between">
    <button onclick="showView('home')" class="text-cyan-600 font-medium text-sm">&larr; Home</button>
    <span id="scorer-title" class="text-sm font-semibold text-gray-700"></span>
    <button onclick="endInnings()" class="text-red-500 text-sm font-medium">End Inns</button>
  </div>

  <div id="scorer-scoreboard" class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm text-center">
    <div class="text-4xl font-black text-cyan-600"><span id="sb-runs">0</span>/<span id="sb-wkts">0</span></div>
    <div class="text-xs text-gray-500 mt-0.5">Ov <span id="sb-ov">0.0</span>/<span id="sb-maxov">0</span> &middot; RR <span id="sb-rr">0.00</span> &middot; <span id="sb-bat">Batting</span> &middot; Extras <span id="sb-ext">0</span></div>
  </div>

  <div id="scorer-batsmen" class="bg-white rounded-xl p-3 border border-gray-200 shadow-sm">
    <div class="flex justify-between text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 px-2"><span>Batsman</span><span>R B 4s 6s</span></div>
    <div id="sb-striker" class="flex justify-between px-2 py-1.5 bg-blue-50 rounded-lg text-sm font-medium text-gray-800"><span></span><span></span></div>
    <div id="sb-nonstriker" class="flex justify-between px-2 py-1.5 text-sm text-gray-600"><span></span><span></span></div>
    <button onclick="changeStrike()" class="mt-1 w-full text-xs text-cyan-600 font-medium py-1 hover:underline">↔ Change Strike</button>
  </div>

  <div class="bg-white rounded-xl p-3 border border-gray-200 shadow-sm flex items-center justify-between">
    <span class="text-sm text-gray-600"><span class="font-semibold">Bowler:</span> <span id="sb-bowler">—</span></span>
    <span class="text-xs text-gray-500"><span id="sb-bowl-stats">0-0-0-0</span></span>
    <button onclick="nextBowler()" class="text-xs text-cyan-600 font-medium hover:underline">Change</button>
  </div>

  <div id="scorer-over" class="bg-white rounded-xl p-3 border border-gray-200 shadow-sm min-h-[40px]"></div>

  <div class="bg-white rounded-xl p-3 border border-gray-200 shadow-sm">
    <div class="grid grid-cols-6 gap-2">
      <button onclick="scoreRuns(0)" class="btn-score bg-gray-100 text-gray-800 text-2xl">0</button>
      <button onclick="scoreRuns(1)" class="btn-score bg-gray-100 text-gray-800 text-2xl">1</button>
      <button onclick="scoreRuns(2)" class="btn-score bg-gray-100 text-gray-800 text-2xl">2</button>
      <button onclick="scoreRuns(3)" class="btn-score bg-gray-100 text-gray-800 text-2xl">3</button>
      <button onclick="scoreRuns(4)" class="btn-score bg-blue-100 text-blue-800 text-2xl">4</button>
      <button onclick="scoreRuns(6)" class="btn-score bg-purple-100 text-purple-800 text-2xl">6</button>
    </div>
    <div class="grid grid-cols-3 gap-2 mt-2">
      <button onclick="openExtraModal('wide')" class="btn-score btn-sm bg-yellow-50 text-yellow-800 border border-yellow-200">Wide</button>
      <button onclick="openExtraModal('noball')" class="btn-score btn-sm bg-orange-50 text-orange-800 border border-orange-200">No-Ball</button>
      <button onclick="openWicketModal()" class="btn-score btn-sm bg-red-50 text-red-800 border border-red-200">Wicket</button>
    </div>
    <div class="grid grid-cols-2 gap-2 mt-2">
      <button onclick="undoLast()" class="btn-score btn-sm bg-gray-100 text-gray-600 border border-gray-200">↩ Undo</button>
      <button onclick="endOver()" class="btn-score btn-sm bg-gray-100 text-gray-600 border border-gray-200">End Over</button>
    </div>
  </div>
</div>

<!-- ══ LEADERBOARD ══ -->
<div id="view-leaderboard" class="view">
  <div class="flex items-center gap-2">
    <button onclick="showView('home')" class="text-cyan-600 font-medium text-sm">&larr; Back</button>
    <h2 class="text-xl font-bold text-gray-900">Leaderboard</h2>
    <button onclick="renderLeaderboard()" class="ml-auto bg-gray-100 border px-3 py-1.5 rounded-lg text-xs font-medium">↻</button>
  </div>
  <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
    <h3 class="text-sm font-bold text-gray-700 mb-2">Top Run-Scorers</h3>
    <div id="lb-runs" class="space-y-1 text-sm"></div>
  </div>
  <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
    <h3 class="text-sm font-bold text-gray-700 mb-2">Top Wicket-Takers</h3>
    <div id="lb-wkts" class="space-y-1 text-sm"></div>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content space-y-3">
    <div id="modal-title" class="font-bold text-lg text-gray-800"></div>
    <div id="modal-body"></div>
    <button onclick="closeModal()" class="w-full text-gray-400 text-sm py-2 hover:text-gray-600 font-medium">Cancel</button>
  </div>
</div>

</div>

<script>
// ─────── DATA LAYER ───────
const KEY = 'cricket_scorer_data';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || defaultData(); }
  catch { return defaultData(); }
}
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
function defaultData() {
  return { matches: {}, players: {}, matchTeams: {}, innings: {}, balls: {}, ballSeq: 0 };
}

function nextBallId() { const d = load(); d.ballSeq = (d.ballSeq || 0) + 1; save(d); return d.ballSeq; }

// ─────── STATE ───────
let currentState = { matchId: null };

// ─────── VIEWS ───────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + name);
  if (el) el.classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'leaderboard') renderLeaderboard();
}

// ─────── START MATCH ───────
function startMatch() {
  const midInput = document.getElementById('setup-mid').value.trim().toUpperCase();
  const overs = parseInt(document.getElementById('setup-overs').value);
  const ta = document.getElementById('setup-ta').value.trim();
  const tb = document.getElementById('setup-tb').value.trim();
  const na = parseInt(document.getElementById('setup-na').value);
  const nb = parseInt(document.getElementById('setup-nb').value);
  const err = document.getElementById('setup-err');
  if (!ta || !tb) { err.textContent = 'Enter both team names'; return; }

  const d = load();
  let mid = midInput;
  if (!mid) {
    let n = 1;
    while (d.matches['M' + String(n).padStart(3,'0')]) n++;
    mid = 'M' + String(n).padStart(3,'0');
  }
  if (d.matches[mid]) { err.textContent = 'Match ID already exists'; return; }

  d.matches[mid] = { id: mid, teamA: ta, teamB: tb, overs, status: 'ongoing', created: new Date().toISOString() };

  // Auto-generate players
  const genId = () => 'p' + Date.now() + Math.random().toString(36).slice(2,6);
  const teamAplayers = Array.from({length: na}, (_, i) => ({ id: genId(), name: 'P' + (i + 1), team: 'a' }));
  const teamBplayers = Array.from({length: nb}, (_, i) => ({ id: genId(), name: 'P' + (i + 1), team: 'b' }));
  const allP = {};
  teamAplayers.forEach(p => { allP[p.id] = p; });
  teamBplayers.forEach(p => { allP[p.id] = p; });
  d.players = { ...(d.players || {}), ...allP };

  d.matchTeams[mid] = {
    teamAIds: teamAplayers.map(p => p.id),
    teamBIds: teamBplayers.map(p => p.id),
    xiA: teamAplayers.map(p => p.id),
    xiB: teamBplayers.map(p => p.id),
  };

  const bs = {};
  teamAplayers.forEach(p => { bs[p.id] = { runs: 0, balls: 0, fours: 0, sixes: 0, dismissed: false, dismissalType: null }; });
  teamBplayers.forEach(p => { bs[p.id] = { runs: 0, balls: 0, fours: 0, sixes: 0, dismissed: false, dismissalType: null }; });
  const br = {};
  teamBplayers.forEach(p => { br[p.id] = { runs: 0, wickets: 0, balls: 0 }; });

  d.innings[mid] = {
    id: mid + '_1', matchId: mid, inningsNo: 1,
    batting: ta, bowling: tb,
    runs: 0, wickets: 0, balls: 0, extras: 0,
    currentOver: 0, currentBall: 0,
    battingOrder: teamAplayers.map(p => p.id),
    strikerIdx: 0, nonStrikerIdx: 1, nextIdx: 2,
    batsmanStats: bs,
    currentBowler: teamBplayers.length > 0 ? teamBplayers[0].id : null,
    bowlerStats: br,
    overBalls: [],
    completed: false,
  };
  d.balls[mid] = [];
  save(d);

  err.textContent = '';
  document.getElementById('setup-mid').value = '';
  document.getElementById('setup-ta').value = '';
  document.getElementById('setup-tb').value = '';

  openScorer(mid);
}

// ─────── SCORER ───────
function openScorer(mid) {
  currentState.matchId = mid;
  showView('scorer');
  renderScorer();
}

function getInnings(mid) {
  const d = load();
  return d.innings[mid] || null;
}
function saveInnings(mid, inn) {
  const d = load();
  d.innings[mid] = inn;
  save(d);
}
function getMatch(mid) {
  const d = load();
  return d.matches[mid] || null;
}
function getBalls(mid) {
  const d = load();
  return d.balls[mid] || [];
}
function saveBall(mid, ball) {
  const d = load();
  if (!d.balls[mid]) d.balls[mid] = [];
  d.balls[mid].push(ball);
  save(d);
}
function popLastBall(mid) {
  const d = load();
  if (!d.balls[mid] || !d.balls[mid].length) return null;
  return d.balls[mid].pop();
}

function renderScorer() {
  const mid = currentState.matchId;
  if (!mid) return;
  const d = load();
  const match = d.matches[mid];
  const inn = d.innings[mid];
  if (!match || !inn) return;

  document.getElementById('scorer-title').textContent = match.teamA + ' vs ' + match.teamB + ' (' + mid + ')';
  document.getElementById('sb-runs').textContent = inn.runs;
  document.getElementById('sb-wkts').textContent = inn.wickets;
  document.getElementById('sb-ov').textContent = inn.currentOver + '.' + inn.currentBall;
  document.getElementById('sb-maxov').textContent = match.overs;
  document.getElementById('sb-bat').textContent = inn.batting;
  document.getElementById('sb-ext').textContent = inn.extras;

  // Run rate
  const totalDeliveries = inn.balls;
  const rr = totalDeliveries > 0 ? (inn.runs / (totalDeliveries / 6)).toFixed(2) : '0.00';
  document.getElementById('sb-rr').textContent = rr;

  // Batsmen
  const sId = inn.battingOrder[inn.strikerIdx];
  const nsId = inn.battingOrder[inn.nonStrikerIdx];
  const p = d.players || {};
  if (sId) {
    const s = inn.batsmanStats[sId] || { runs: 0, balls: 0, fours: 0, sixes: 0 };
    document.getElementById('sb-striker').innerHTML =
      '<span>' + (p[sId]?.name || 'Bat') + '<span class="text-xs text-blue-500 ml-1">*</span></span>' +
      '<span class="tabular-nums">' + s.runs + ' ' + s.balls + ' ' + s.fours + ' ' + s.sixes + '</span>';
  }
  if (nsId) {
    const ns = inn.batsmanStats[nsId] || { runs: 0, balls: 0, fours: 0, sixes: 0 };
    document.getElementById('sb-nonstriker').innerHTML =
      '<span>' + (p[nsId]?.name || 'Bat') + '</span>' +
      '<span class="tabular-nums">' + ns.runs + ' ' + ns.balls + ' ' + ns.fours + ' ' + ns.sixes + '</span>';
  }

  // Bowler
  if (inn.currentBowler) {
    const b = inn.bowlerStats[inn.currentBowler] || { runs: 0, wickets: 0, balls: 0 };
    document.getElementById('sb-bowler').textContent = p[inn.currentBowler]?.name || '?';
    const bo = Math.floor((b.balls || 0) / 6) + '.' + ((b.balls || 0) % 6);
    document.getElementById('sb-bowl-stats').textContent = bo + '-' + (b.wickets || 0) + '-' + (b.runs || 0);
  }

  // Over balls
  const obEl = document.getElementById('scorer-over');
  const obs = inn.overBalls || [];
  let completedOvers = inn.currentOver;
  if (inn.currentBall === 0 && inn.currentOver > 0) completedOvers = inn.currentOver;
  else if (inn.currentBall > 0) completedOvers = inn.currentOver;

  obEl.innerHTML = '<div class="text-xs text-gray-500 mb-1 font-medium">Over ' + (inn.currentOver + 1) + ':</div>';
  if (!obs.length) {
    obEl.innerHTML += '<div class="text-xs text-gray-400">No balls yet</div>';
  } else {
    obEl.innerHTML += '<div class="flex items-center gap-2 flex-wrap">' +
      obs.map(b => {
        let cls = 'run', lbl = String(b.runs);
        if (b.wicket) { cls = 'wicket'; lbl = 'W'; }
        else if (b.extraType === 'wide') { cls = 'wide'; lbl = 'WD' + (b.runs > 0 ? b.runs : ''); }
        else if (b.extraType === 'noball') { cls = 'noball'; lbl = 'NB' + (b.runs > 0 ? b.runs : ''); }
        else if (b.runs === 4) { cls = 'four'; lbl = '4'; }
        else if (b.runs === 6) { cls = 'six'; lbl = '6'; }
        else if (b.runs === 0) { lbl = '•'; }
        return '<span class="ball-dot ' + cls + '">' + lbl + '</span>';
      }).join('') + '</div>';
  }
}

// ─────── SCORE RUNS ───────
function scoreRuns(runs) {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  if (inn.currentBall === 0 && inn.currentOver >= getMatch(mid).overs) return;
  if (inn.currentBall >= 6) return;

  const sId = inn.battingOrder[inn.strikerIdx];
  const nsId = inn.battingOrder[inn.nonStrikerIdx];

  const ball = {
    id: nextBallId(),
    over: inn.currentOver + 1,
    ballInOver: inn.currentBall + 1,
    runs, extras: 0, extraType: null,
    wicket: false, wicketType: null,
    strikerId: sId, nonStrikerId: nsId,
    bowlerId: inn.currentBowler,
    totalRuns: runs,
    timestamp: new Date().toISOString(),
  };

  inn.runs += runs;
  inn.balls += 1;
  inn.currentBall += 1;
  if (inn.currentBall === 6) { inn.currentOver += 1; inn.currentBall = 0; }

  if (sId && inn.batsmanStats[sId]) {
    inn.batsmanStats[sId].runs += runs;
    inn.batsmanStats[sId].balls += 1;
    if (runs === 4) inn.batsmanStats[sId].fours += 1;
    if (runs === 6) inn.batsmanStats[sId].sixes += 1;
  }
  if (inn.currentBowler && inn.bowlerStats[inn.currentBowler]) {
    inn.bowlerStats[inn.currentBowler].runs += runs;
    inn.bowlerStats[inn.currentBowler].balls += 1;
  }

  // Strike rotation on odd runs
  if (runs % 2 === 1) {
    [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  }
  // End of over strike rotation
  if (inn.currentBall === 0 && inn.currentOver > 0) {
    [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  }

  inn.overBalls.push(ball);
  saveBall(mid, ball);
  saveInnings(mid, inn);
  renderScorer();
  checkInningsEnd();
}

// ─────── EXTRAS ───────
let extraCtx = {};

function openExtraModal(type) {
  extraCtx = { type, extraRuns: 0, wicket: false, wicketType: null };
  document.getElementById('modal-title').textContent = type === 'wide' ? 'Wide' : 'No-Ball';
  document.getElementById('modal-body').innerHTML =
    '<p class="text-sm text-gray-500 mb-3">+1 run. Additional runs?</p>' +
    '<div class="grid grid-cols-5 gap-2 mb-3">' +
      [0,1,2,3,4].map(r => '<button onclick="extraRuns('+r+')" class="btn-score btn-sm bg-gray-100 border border-gray-200">'+(r||'0')+'</button>').join('') +
    '</div>' +
    '<button onclick="extraWicket()" class="w-full btn-score btn-sm bg-red-50 text-red-700 border border-red-200">Wicket</button>';
  document.getElementById('modal-overlay').classList.add('open');
}

function extraRuns(r) {
  extraCtx.extraRuns = r;
  closeModal();
  processExtra();
}

function extraWicket() {
  document.getElementById('modal-title').textContent = 'Dismissal';
  document.getElementById('modal-body').innerHTML =
    '<p class="text-sm text-gray-500 mb-3">Dismissal type?</p>' +
    '<div class="grid grid-cols-2 gap-2 mb-2">' +
      ['Bowled','Caught','LBW','Run Out','Stumped','Hit Wicket'].map(t =>
        '<button onclick="extraWicketType(\''+t+'\')" class="btn-score btn-sm bg-red-50 text-red-700 border border-red-200">'+t+'</button>'
      ).join('') +
    '</div>';
}

function extraWicketType(type) {
  extraCtx.wicket = true;
  extraCtx.wicketType = type;
  closeModal();
  processExtra();
}

function processExtra() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  if (inn.currentBall === 0 && inn.currentOver >= getMatch(mid).overs) return;

  const sId = inn.battingOrder[inn.strikerIdx];
  const nsId = inn.battingOrder[inn.nonStrikerIdx];
  const extraRun = 1 + (extraCtx.extraRuns || 0);

  const ball = {
    id: nextBallId(),
    over: inn.currentOver + 1,
    ballInOver: inn.currentBall + 1,
    runs: extraCtx.extraRuns || 0,
    extras: extraRun,
    extraType: extraCtx.type,
    wicket: extraCtx.wicket,
    wicketType: extraCtx.wicketType,
    strikerId: sId, nonStrikerId: nsId,
    bowlerId: inn.currentBowler,
    totalRuns: extraRun,
    timestamp: new Date().toISOString(),
  };

  inn.extras += extraRun;
  inn.runs += extraRun;
  // Ball NOT incremented for wides/noballs

  if (extraCtx.wicket) {
    inn.wickets += 1;
    if (sId && inn.batsmanStats[sId]) {
      inn.batsmanStats[sId].dismissed = true;
      inn.batsmanStats[sId].dismissalType = extraCtx.wicketType;
    }
    advanceBatsman(inn);
    if (inn.currentBowler && inn.bowlerStats[inn.currentBowler]) {
      inn.bowlerStats[inn.currentBowler].wickets += 1;
    }
  }

  // Strike rotation on odd bat runs
  if ((extraCtx.extraRuns || 0) % 2 === 1) {
    [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  }

  inn.overBalls.push(ball);
  saveBall(mid, ball);
  saveInnings(mid, inn);
  renderScorer();
  checkInningsEnd();
}

// ─────── WICKET ───────
function openWicketModal() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  if (inn.currentBall === 0 && inn.currentOver >= getMatch(mid).overs) return;
  if (inn.currentBall >= 6) return;

  document.getElementById('modal-title').textContent = 'Wicket';
  document.getElementById('modal-body').innerHTML =
    '<p class="text-sm text-gray-500 mb-3">Dismissal type?</p>' +
    '<div class="grid grid-cols-2 gap-2 mb-2">' +
      ['Bowled','Caught','LBW','Run Out','Stumped','Hit Wicket'].map(t =>
        '<button onclick="processWicket(\''+t+'\')" class="btn-score btn-sm bg-red-50 text-red-700 border border-red-200">'+t+'</button>'
      ).join('') +
    '</div>';
  document.getElementById('modal-overlay').classList.add('open');
}

function processWicket(type) {
  closeModal();
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  if (inn.currentBall >= 6) return;

  const sId = inn.battingOrder[inn.strikerIdx];
  const nsId = inn.battingOrder[inn.nonStrikerIdx];

  const ball = {
    id: nextBallId(),
    over: inn.currentOver + 1,
    ballInOver: inn.currentBall + 1,
    runs: 0, extras: 0, extraType: null,
    wicket: true, wicketType: type,
    strikerId: sId, nonStrikerId: nsId,
    bowlerId: inn.currentBowler,
    totalRuns: 0,
    timestamp: new Date().toISOString(),
  };

  inn.wickets += 1;
  inn.balls += 1;
  inn.currentBall += 1;
  if (inn.currentBall === 6) { inn.currentOver += 1; inn.currentBall = 0; }

  if (sId && inn.batsmanStats[sId]) {
    inn.batsmanStats[sId].balls += 1;
    inn.batsmanStats[sId].dismissed = true;
    inn.batsmanStats[sId].dismissalType = type;
  }
  if (inn.currentBowler && inn.bowlerStats[inn.currentBowler]) {
    inn.bowlerStats[inn.currentBowler].balls += 1;
    inn.bowlerStats[inn.currentBowler].wickets += 1;
  }

  advanceBatsman(inn);

  // End of over strike rotation
  if (inn.currentBall === 0 && inn.currentOver > 0) {
    [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  }

  inn.overBalls.push(ball);
  saveBall(mid, ball);
  saveInnings(mid, inn);
  renderScorer();
  checkInningsEnd();
}

function advanceBatsman(inn) {
  while (inn.nextIdx < inn.battingOrder.length) {
    const nid = inn.battingOrder[inn.nextIdx];
    if (!inn.batsmanStats[nid]?.dismissed) {
      inn.strikerIdx = inn.nextIdx;
      inn.nextIdx++;
      return;
    }
    inn.nextIdx++;
  }
}

// ─────── CHANGE STRIKE ───────
function changeStrike() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn) return;
  [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  saveInnings(mid, inn);
  renderScorer();
}

// ─────── END OVER ───────
function endOver() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  if (inn.currentBall === 0 && inn.currentOver === 0) return;
  if (inn.currentBall === 0) return;

  inn.currentOver += 1;
  inn.currentBall = 0;
  [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  inn.overBalls = [];
  saveInnings(mid, inn);
  renderScorer();
  checkInningsEnd();
}

// ─────── UNDO ───────
function undoLast() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn) return;
  const last = popLastBall(mid);
  if (!last) return;
  recalculateInnings(mid);
  renderScorer();
}

function recalculateInnings(mid) {
  const d = load();
  const match = d.matches[mid];
  const inn = d.innings[mid];
  const balls = d.balls[mid] || [];

  inn.runs = 0; inn.wickets = 0; inn.balls = 0; inn.extras = 0;
  inn.currentOver = 0; inn.currentBall = 0;
  inn.overBalls = [];

  Object.keys(inn.batsmanStats).forEach(id => {
    inn.batsmanStats[id] = { runs: 0, balls: 0, fours: 0, sixes: 0, dismissed: false, dismissalType: null };
  });
  Object.keys(inn.bowlerStats).forEach(id => {
    inn.bowlerStats[id] = { runs: 0, wickets: 0, balls: 0 };
  });

  inn.strikerIdx = 0;
  inn.nonStrikerIdx = 1;
  inn.nextIdx = 2;
  // If first player is already dismissed (shouldn't happen without balls), skip
  if (inn.battingOrder.length > 0 && inn.batsmanStats[inn.battingOrder[0]]?.dismissed) {
    inn.strikerIdx = -1;
    inn.nonStrikerIdx = -1;
    inn.nextIdx = 0;
  }

  const lastOverBalls = [];

  balls.forEach(ball => {
    inn.runs += ball.totalRuns || 0;
    if (ball.extras > 0) inn.extras += ball.extras;

    const isLegal = !ball.extraType;
    if (isLegal) {
      inn.balls += 1;
      inn.currentBall += 1;
      if (inn.currentBall === 6) { inn.currentOver += 1; inn.currentBall = 0; }
    }

    // Batsman stats
    if (ball.strikerId && inn.batsmanStats[ball.strikerId]) {
      inn.batsmanStats[ball.strikerId].runs += ball.runs || 0;
      if (isLegal) {
        inn.batsmanStats[ball.strikerId].balls += 1;
        if (ball.runs === 4) inn.batsmanStats[ball.strikerId].fours += 1;
        if (ball.runs === 6) inn.batsmanStats[ball.strikerId].sixes += 1;
      }
    }

    // Bowler stats
    if (ball.bowlerId && inn.bowlerStats[ball.bowlerId]) {
      inn.bowlerStats[ball.bowlerId].runs += ball.totalRuns || 0;
      if (isLegal) inn.bowlerStats[ball.bowlerId].balls += 1;
    }

    // Wicket
    if (ball.wicket) {
      inn.wickets += 1;
      if (ball.strikerId && inn.batsmanStats[ball.strikerId]) {
        inn.batsmanStats[ball.strikerId].dismissed = true;
        inn.batsmanStats[ball.strikerId].dismissalType = ball.wicketType;
      }
      if (ball.bowlerId && inn.bowlerStats[ball.bowlerId]) {
        inn.bowlerStats[ball.bowlerId].wickets += 1;
      }
      advanceBatsman(inn);
    }

    // Strike rotation on bat runs
    if ((ball.runs || 0) % 2 === 1) {
      [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
    }

    // End of over rotation
    if (isLegal && inn.currentBall === 0 && inn.currentOver > 0) {
      [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
    }

    // Track last over balls
    if (ball.over === (inn.currentOver + 1) || (inn.currentOver === 0 && ball.over === 1)) {
      lastOverBalls.push(ball);
    }
  });

  inn.overBalls = lastOverBalls;
  if (inn.overBalls.length === 0 && balls.length > 0) {
    const lo = balls[balls.length - 1].over;
    inn.overBalls = balls.filter(b => b.over === lo);
  }

  saveInnings(mid, inn);
}

// ─────── CHANGE BOWLER ───────
function nextBowler() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn) return;
  const d = load();
  const mt = d.matchTeams[mid];
  if (!mt) return;
  const ids = mt.xiB || mt.teamBIds || [];
  if (!ids.length) return;
  const idx = ids.indexOf(inn.currentBowler);
  inn.currentBowler = ids[(idx + 1) % ids.length];
  if (!inn.bowlerStats[inn.currentBowler]) {
    inn.bowlerStats[inn.currentBowler] = { runs: 0, wickets: 0, balls: 0 };
  }
  saveInnings(mid, inn);
  renderScorer();
}

// ─────── END INNINGS ───────
function endInnings() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  inn.completed = true;
  const d = load();
  d.matches[mid].status = 'completed';
  saveInnings(mid, inn);
  save(d);
  showView('home');
  renderHome();
}

function checkInningsEnd() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  const d = load();
  const match = d.matches[mid];
  if (!match) return;

  const active = inn.battingOrder.filter(id => !inn.batsmanStats[id]?.dismissed).length;
  const oversDone = inn.currentOver >= match.overs;

  if (active <= 1 || (oversDone && inn.currentBall === 0)) {
    endInnings();
  }
}

// ─────── MODAL ───────
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ─────── HOME ───────
function renderHome() {
  const d = load();
  const matches = Object.values(d.matches || {}).sort((a, b) => (b.created || '').localeCompare(a.created || ''));
  const el = document.getElementById('home-match-list');
  if (!matches.length) {
    el.innerHTML = '<div class="bg-white rounded-xl p-6 text-center text-gray-400 text-sm border border-gray-200 shadow-sm">No matches yet. Create one!</div>';
    return;
  }
  el.innerHTML = matches.map(m => {
    const inn = d.innings[m.id];
    const isOn = m.status === 'ongoing';
    const score = inn ? inn.runs + '/' + inn.wickets : '—';
    const ov = inn ? inn.currentOver + '.' + inn.currentBall : '—';
    return '<div onclick="openScorer(\'' + m.id + '\')" class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm flex items-center justify-between cursor-pointer active:scale-[0.98] transition">' +
      '<div><div class="font-semibold text-gray-900 text-sm">' + m.teamA + ' vs ' + m.teamB + '</div>' +
      '<div class="text-xs text-gray-500">' + m.id + ' &middot; ' + m.overs + ' ov &middot; <span class="' + (isOn ? 'text-green-600' : 'text-gray-400') + ' font-medium">' + m.status + '</span></div></div>' +
      '<div class="text-right"><div class="text-lg font-black ' + (isOn ? 'text-cyan-600' : 'text-gray-500') + '">' + score + '</div>' +
      '<div class="text-xs text-gray-400">Ov ' + ov + '</div></div></div>';
  }).join('');
}

// ─────── LEADERBOARD ───────
function renderLeaderboard() {
  const d = load();
  const allBalls = Object.values(d.balls || {}).flat();
  const players = d.players || {};

  const runs = {};
  allBalls.forEach(b => {
    if (b.strikerId && !b.extraType) {
      if (!runs[b.strikerId]) runs[b.strikerId] = { runs: 0, balls: 0 };
      runs[b.strikerId].runs += b.runs || 0;
      runs[b.strikerId].balls += 1;
    }
  });
  const topRuns = Object.entries(runs).sort((a, b) => b[1].runs - a[1].runs).slice(0, 3);

  document.getElementById('lb-runs').innerHTML = topRuns.length
    ? topRuns.map(([id, s], i) =>
      '<div class="flex justify-between py-1.5 ' + (i === 0 ? 'font-bold text-gray-900' : 'text-gray-600') + '">' +
        '<span>' + (i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉') + ' ' + (players[id]?.name || 'Unknown') + '</span>' +
        '<span class="tabular-nums">' + s.runs + ' runs (' + s.balls + ' balls)</span>' +
      '</div>'
    ).join('')
    : '<div class="text-gray-400 text-sm">No data yet</div>';

  const wkts = {};
  allBalls.forEach(b => {
    if (b.wicket && b.bowlerId) {
      if (!wkts[b.bowlerId]) wkts[b.bowlerId] = { wickets: 0 };
      wkts[b.bowlerId].wickets += 1;
    }
  });
  const topWkts = Object.entries(wkts).sort((a, b) => b[1].wickets - a[1].wickets).slice(0, 3);

  document.getElementById('lb-wkts').innerHTML = topWkts.length
    ? topWkts.map(([id, s], i) =>
      '<div class="flex justify-between py-1.5 ' + (i === 0 ? 'font-bold text-gray-900' : 'text-gray-600') + '">' +
        '<span>' + (i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉') + ' ' + (players[id]?.name || 'Unknown') + '</span>' +
        '<span class="tabular-nums">' + s.wickets + ' wickets</span>' +
      '</div>'
    ).join('')
    : '<div class="text-gray-400 text-sm">No data yet</div>';
}

// ─────── INIT ───────
renderHome();
</script>
