<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cricket Scorer</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f1f5f9;min-height:100dvh}
.view{display:none}.view.active{display:block}
.btn-score{user-select:none;touch-action:manipulation;transition:all .1s;min-height:56px;display:flex;align-items:center;justify-content:center;font-weight:700;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.btn-score:active{transform:scale(.93);opacity:.8}
.btn-sm{min-height:44px;font-size:.875rem}
.ball-dot{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-size:12px;font-weight:700;color:#fff;margin:2px}
.ball-dot.run{background:#3b82f6}
.ball-dot.four{background:#8b5cf6}
.ball-dot.six{background:#ec4899}
.ball-dot.wicket{background:#ef4444}
.ball-dot.wide{background:#eab308;color:#000}
.ball-dot.noball{background:#f97316}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.xi-chip{display:inline-flex;align-items:center;gap:4px;background:#e0f2fe;color:#0369a1;border-radius:20px;padding:4px 12px;font-size:13px;margin:3px;cursor:pointer;border:1px solid #bae6fd;transition:all .1s}
.xi-chip.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.xi-chip.dim{opacity:.5}
select,input{border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:15px;width:100%;background:#fff}
select:focus,input:focus{outline:none;border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,.15)}
label{font-size:13px;font-weight:600;color:#374151;margin-bottom:2px;display:block}
.live-pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div class="max-w-lg mx-auto px-3 py-4 space-y-4" id="app">

<!-- ══ HOME ══ -->
<div id="view-home" class="view active">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900">Cricket Scorer</h1>
    <button onclick="showView('leaderboard')" class="bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm font-medium text-gray-700">Team Stats</button>
    <button onclick="openSettingsModal()" class="bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm font-medium text-gray-700 text-xl leading-none">⚙️</button>
  </div>
  <div id="home-match-list" class="space-y-2"></div>
  <button onclick="showView('setup')" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-semibold py-3 rounded-xl text-base shadow-sm active:scale-95 transition">+ New Match</button>
  <div class="text-center text-xs text-gray-400">Data saves in your browser (localStorage)</div>
</div>

<!-- ══ SETUP ══ -->
<div id="view-setup" class="view">
  <div class="flex items-center gap-2">
    <button onclick="showView('home')" class="text-cyan-600 font-medium text-sm">&larr; Back</button>
    <h2 class="text-xl font-bold text-gray-900">New Match</h2>
  </div>
  <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm space-y-3">
    <div><label>Match ID (optional)</label><input id="setup-mid" placeholder="Auto if blank" class="text-sm"></div>
    <div><label>Overs</label><select id="setup-overs"><option>4</option><option>5</option><option selected>6</option><option>7</option></select></div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label>Team A</label>
        <input id="setup-ta" list="team-presets" placeholder="Name" class="text-sm">
        <div class="mt-2"><label class="text-xs">Players</label><select id="setup-na"><option>3</option><option>4</option><option>5</option><option>6</option><option selected>7</option><option>8</option><option>9</option><option>10</option><option>11</option></select></div>
      </div>
      <div>
        <label>Team B</label>
        <input id="setup-tb" list="team-presets" placeholder="Name" class="text-sm">
        <div class="mt-2"><label class="text-xs">Players</label><select id="setup-nb"><option>3</option><option>4</option><option>5</option><option>6</option><option selected>7</option><option>8</option><option>9</option><option>10</option><option>11</option></select></div>
      </div>
    </div>
    <datalist id="team-presets"></datalist>
    <div id="setup-team-presets" class="flex flex-wrap gap-1.5" style="display:none"></div>
    <button onclick="startMatch()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 rounded-xl text-base shadow-sm active:scale-95 transition">Start Match</button>
    <div id="setup-err" class="text-xs text-red-500 text-center"></div>
  </div>
</div>

<!-- ══ SCORER ══ -->
<div id="view-scorer" class="view">
  <div class="flex items-center justify-between">
    <button onclick="showView('home')" class="text-cyan-600 font-medium text-sm">&larr; Home</button>
    <span id="scorer-title" class="text-sm font-semibold text-gray-700"></span>
    <button onclick="endInnings()" class="text-red-500 text-sm font-medium">End Inns</button>
  </div>

  <!-- Innings toggle -->
  <div id="scorer-inns-toggle" class="flex gap-2 justify-center" style="display:none">
    <button id="inns-btn-1" onclick="switchInnings(1)" class="px-4 py-1.5 rounded-lg text-sm font-semibold transition bg-cyan-500 text-white">Innings 1</button>
    <button id="inns-btn-2" onclick="switchInnings(2)" class="px-4 py-1.5 rounded-lg text-sm font-semibold transition bg-gray-200 text-gray-500">Innings 2</button>
  </div>

  <div id="scorer-scoreboard" class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm text-center">
    <div class="text-xs text-gray-400 font-medium uppercase tracking-wide">Innings <span id="sb-inns-no">1</span></div>
    <div class="text-4xl font-black text-cyan-600"><span id="sb-runs">0</span>/<span id="sb-wkts">0</span></div>
    <div class="text-xs text-gray-500 mt-0.5">Ov <span id="sb-ov">0.0</span>/<span id="sb-maxov">0</span> &middot; RR <span id="sb-rr">0.00</span> &middot; <span id="sb-bat">Batting</span> &middot; Extras <span id="sb-ext">0</span></div>
  </div>

  <div id="scorer-batsmen" class="bg-white rounded-xl p-3 border border-gray-200 shadow-sm">
    <div class="flex justify-between text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 px-2"><span>Batsman</span><span>R B 4s 6s</span></div>
    <div id="sb-striker" class="flex justify-between px-2 py-1.5 bg-blue-50 rounded-lg text-sm font-medium text-gray-800"><span></span><span></span></div>
    <div id="sb-nonstriker" class="flex justify-between px-2 py-1.5 text-sm text-gray-600"><span></span><span></span></div>
  </div>

  <div class="bg-white rounded-xl p-3 border border-gray-200 shadow-sm flex items-center justify-between">
    <span class="text-sm text-gray-600"><span class="font-semibold">Bowler:</span> <span id="sb-bowler">—</span></span>
    <span class="text-xs text-gray-500"><span id="sb-bowl-stats">0-0-0-0</span></span>
    <button onclick="nextBowler()" class="text-xs text-cyan-600 font-medium hover:underline">Change</button>
  </div>

  <div id="scorer-over" class="bg-white rounded-xl p-3 border border-gray-200 shadow-sm min-h-[40px]"></div>

  <div class="bg-white rounded-xl p-3 border border-gray-200 shadow-sm">
    <div class="grid grid-cols-6 gap-2">
      <button onclick="scoreRuns(0)" class="btn-score bg-gray-100 text-gray-800 text-2xl">0</button>
      <button onclick="scoreRuns(1)" class="btn-score bg-gray-100 text-gray-800 text-2xl">1</button>
      <button onclick="scoreRuns(2)" class="btn-score bg-gray-100 text-gray-800 text-2xl">2</button>
      <button onclick="scoreRuns(3)" class="btn-score bg-gray-100 text-gray-800 text-2xl">3</button>
      <button onclick="scoreRuns(4)" class="btn-score bg-blue-100 text-blue-800 text-2xl">4</button>
      <button onclick="scoreRuns(6)" class="btn-score bg-purple-100 text-purple-800 text-2xl">6</button>
    </div>
    <div class="grid grid-cols-3 gap-2 mt-2">
      <button onclick="openExtraModal('wide')" class="btn-score btn-sm bg-yellow-50 text-yellow-800 border border-yellow-200">Wide</button>
      <button onclick="openExtraModal('noball')" class="btn-score btn-sm bg-orange-50 text-orange-800 border border-orange-200">No-Ball</button>
      <button onclick="openWicketModal()" class="btn-score btn-sm bg-red-50 text-red-800 border border-red-200">Wicket</button>
    </div>
    <div class="grid grid-cols-3 gap-2 mt-2">
      <button onclick="undoLast()" class="btn-score btn-sm bg-gray-100 text-gray-600 border border-gray-200">↩ Undo</button>
      <button onclick="endOver()" class="btn-score btn-sm bg-gray-100 text-gray-600 border border-gray-200">End Over</button>
      <button onclick="showWhatsAppShare()" class="btn-score btn-sm bg-green-50 text-green-700 border border-green-200 font-semibold">📱 Share</button>
    </div>
  </div>
</div>

<!-- ══ TEAM STATS ══ -->
<div id="view-leaderboard" class="view">
  <div class="flex items-center gap-2">
    <button onclick="showView('home')" class="text-cyan-600 font-medium text-sm">&larr; Back</button>
    <h2 class="text-xl font-bold text-gray-900">Team Stats</h2>
    <button onclick="renderLeaderboard()" class="ml-auto bg-gray-100 border px-3 py-1.5 rounded-lg text-xs font-medium">↻</button>
  </div>
  <div id="lb-teams" class="space-y-2"></div>
</div>

<!-- ══ MODAL ══ -->
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content space-y-3">
    <div id="modal-title" class="font-bold text-lg text-gray-800"></div>
    <div id="modal-body"></div>
    <button onclick="closeModal()" class="w-full text-gray-400 text-sm py-2 hover:text-gray-600 font-medium">Cancel</button>
  </div>
</div>

<!-- ══ WHATSAPP SHARE ══ -->
<div id="wa-overlay" class="modal-overlay" onclick="if(event.target===this)hideWhatsAppShare()">
  <div class="modal-content text-center space-y-4" style="max-width:320px">
    <div class="text-5xl">📱</div>
    <p class="text-gray-600 text-sm font-medium">Share score to WhatsApp?</p>
    <a id="wa-link" href="#" target="_blank" onclick="setTimeout(hideWhatsAppShare,500)"
       class="inline-flex items-center justify-center gap-2 bg-green-500 hover:bg-green-600 text-white font-semibold px-6 py-3 rounded-xl text-base transition shadow-sm active:scale-95 w-full">
      <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Open WhatsApp
    </a>
    <button onclick="hideWhatsAppShare()" class="text-gray-400 text-sm hover:text-gray-600">Close</button>
  </div>
</div>

</div>

<script>
// ─────── DATA LAYER ───────
const KEY = 'cricket_scorer_data';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || defaultData(); }
  catch { return defaultData(); }
}
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
function defaultData() {
  return { matches: {}, players: {}, matchTeams: {}, innings: {}, balls: {}, ballSeq: 0, teamPresets: [] };
}

function nextBallId() { const d = load(); d.ballSeq = (d.ballSeq || 0) + 1; save(d); return d.ballSeq; }

// ─────── STATE ───────
let currentState = { matchId: null, inningsNo: 1 };

function innKey(mid, innNo) {
  return mid + '_' + (innNo != null ? innNo : currentState.inningsNo);
}

// ─────── VIEWS ───────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + name);
  if (el) el.classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'leaderboard') renderLeaderboard();
  if (name === 'setup') populateTeamPresets();
}

// ─────── START MATCH ───────
function startMatch() {
  const midInput = document.getElementById('setup-mid').value.trim().toUpperCase();
  const overs = parseInt(document.getElementById('setup-overs').value);
  const ta = document.getElementById('setup-ta').value.trim();
  const tb = document.getElementById('setup-tb').value.trim();
  const na = parseInt(document.getElementById('setup-na').value);
  const nb = parseInt(document.getElementById('setup-nb').value);
  const err = document.getElementById('setup-err');
  if (!ta || !tb) { err.textContent = 'Enter both team names'; return; }

  const d = load();
  addTeamPreset(d, ta); addTeamPreset(d, tb);
  let mid = midInput;
  if (!mid) {
    let n = 1;
    while (d.matches['M' + String(n).padStart(3,'0')]) n++;
    mid = 'M' + String(n).padStart(3,'0');
  }
  if (d.matches[mid]) { err.textContent = 'Match ID already exists'; return; }

  d.matches[mid] = { id: mid, teamA: ta, teamB: tb, overs, status: 'ongoing', created: new Date().toISOString() };

  // Auto-generate players
  const genId = () => 'p' + Date.now() + Math.random().toString(36).slice(2,6);
  const teamAplayers = Array.from({length: na}, (_, i) => ({ id: genId(), name: 'P' + (i + 1), team: 'a' }));
  const teamBplayers = Array.from({length: nb}, (_, i) => ({ id: genId(), name: 'P' + (i + 1), team: 'b' }));
  const allP = {};
  teamAplayers.forEach(p => { allP[p.id] = p; });
  teamBplayers.forEach(p => { allP[p.id] = p; });
  d.players = { ...(d.players || {}), ...allP };

  d.matchTeams[mid] = {
    teamAIds: teamAplayers.map(p => p.id),
    teamBIds: teamBplayers.map(p => p.id),
    xiA: teamAplayers.map(p => p.id),
    xiB: teamBplayers.map(p => p.id),
  };

  // Innings 1: Team A bats, Team B bowls
  const bs1 = {};
  teamAplayers.forEach(p => { bs1[p.id] = { runs: 0, balls: 0, fours: 0, sixes: 0, dismissed: false, dismissalType: null }; });
  teamBplayers.forEach(p => { bs1[p.id] = { runs: 0, balls: 0, fours: 0, sixes: 0, dismissed: false, dismissalType: null }; });
  const br1 = {};
  teamBplayers.forEach(p => { br1[p.id] = { runs: 0, wickets: 0, balls: 0 }; });

  d.innings[innKey(mid, 1)] = {
    id: mid + '_1', matchId: mid, inningsNo: 1,
    batting: ta, bowling: tb,
    runs: 0, wickets: 0, balls: 0, extras: 0,
    currentOver: 0, currentBall: 0,
    battingOrder: teamAplayers.map(p => p.id),
    strikerIdx: 0, nonStrikerIdx: 1, nextIdx: 2,
    batsmanStats: bs1,
    currentBowler: teamBplayers.length > 0 ? teamBplayers[0].id : null,
    bowlerStats: br1,
    overBalls: [],
    completed: false,
  };

  // Innings 2: Team B bats, Team A bowls
  const bs2 = {};
  teamBplayers.forEach(p => { bs2[p.id] = { runs: 0, balls: 0, fours: 0, sixes: 0, dismissed: false, dismissalType: null }; });
  teamAplayers.forEach(p => { bs2[p.id] = { runs: 0, balls: 0, fours: 0, sixes: 0, dismissed: false, dismissalType: null }; });
  const br2 = {};
  teamAplayers.forEach(p => { br2[p.id] = { runs: 0, wickets: 0, balls: 0 }; });

  d.innings[innKey(mid, 2)] = {
    id: mid + '_2', matchId: mid, inningsNo: 2,
    batting: tb, bowling: ta,
    runs: 0, wickets: 0, balls: 0, extras: 0,
    currentOver: 0, currentBall: 0,
    battingOrder: teamBplayers.map(p => p.id),
    strikerIdx: 0, nonStrikerIdx: 1, nextIdx: 2,
    batsmanStats: bs2,
    currentBowler: teamAplayers.length > 0 ? teamAplayers[0].id : null,
    bowlerStats: br2,
    overBalls: [],
    completed: false,
  };

  d.balls[mid] = [];
  save(d);

  err.textContent = '';
  document.getElementById('setup-mid').value = '';
  document.getElementById('setup-ta').value = '';
  document.getElementById('setup-tb').value = '';

  openScorer(mid);
}

// ─────── SCORER ───────
function openScorer(mid) {
  currentState.matchId = mid;
  currentState.inningsNo = 1;
  showView('scorer');
  ensureInningsTwo(mid);
  renderScorer();
}

function ensureInningsTwo(mid) {
  const d = load();
  if (d.innings[innKey(mid, 2)]) return;
  const m = d.matches[mid];
  if (!m) return;
  const mt = d.matchTeams[mid];
  const teamBplayers = mt ? (mt.xiB || mt.teamBIds || []) : [];
  const teamAplayers = mt ? (mt.xiA || mt.teamAIds || []) : [];
  const bs2 = {};
  teamBplayers.forEach(p => { bs2[p.id] = { runs: 0, balls: 0, fours: 0, sixes: 0, dismissed: false, dismissalType: null }; });
  teamAplayers.forEach(p => { bs2[p.id] = { runs: 0, balls: 0, fours: 0, sixes: 0, dismissed: false, dismissalType: null }; });
  const br2 = {};
  teamAplayers.forEach(p => { br2[p.id] = { runs: 0, wickets: 0, balls: 0 }; });
  d.innings[innKey(mid, 2)] = {
    id: mid + '_2', matchId: mid, inningsNo: 2,
    batting: m.teamB, bowling: m.teamA,
    runs: 0, wickets: 0, balls: 0, extras: 0,
    currentOver: 0, currentBall: 0,
    battingOrder: teamBplayers.map(p => p.id),
    strikerIdx: 0, nonStrikerIdx: 1, nextIdx: 2,
    batsmanStats: bs2,
    currentBowler: teamAplayers.length > 0 ? teamAplayers[0].id : null,
    bowlerStats: br2,
    overBalls: [],
    completed: false,
  };
  save(d);
}

function getInnings(mid, innNo) {
  const d = load();
  const key = innKey(mid, innNo != null ? innNo : currentState.inningsNo);
  return d.innings[key] || null;
}
function saveInnings(mid, inn, innNo) {
  const d = load();
  const key = innKey(mid, innNo != null ? innNo : inn.inningsNo);
  d.innings[key] = inn;
  save(d);
}
function getMatch(mid) {
  const d = load();
  return d.matches[mid] || null;
}
function getBalls(mid) {
  const d = load();
  return d.balls[mid] || [];
}
function saveBall(mid, ball) {
  const d = load();
  if (!d.balls[mid]) d.balls[mid] = [];
  d.balls[mid].push(ball);
  save(d);
}
function popLastBall(mid) {
  const d = load();
  if (!d.balls[mid] || !d.balls[mid].length) return null;
  const innNo = currentState.inningsNo;
  for (let i = d.balls[mid].length - 1; i >= 0; i--) {
    if (d.balls[mid][i].inningsNo === innNo) {
      return d.balls[mid].splice(i, 1)[0];
    }
  }
  return null;
}

function renderScorer() {
  const mid = currentState.matchId;
  if (!mid) return;
  const d = load();
  const match = d.matches[mid];
  const inn = getInnings(mid, currentState.inningsNo);
  if (!match || !inn) return;

  document.getElementById('scorer-title').textContent = match.teamA + ' vs ' + match.teamB + ' (' + mid + ')';
  document.getElementById('sb-inns-no').textContent = currentState.inningsNo;
  document.getElementById('sb-runs').textContent = inn.runs;
  document.getElementById('sb-wkts').textContent = inn.wickets;
  document.getElementById('sb-ov').textContent = inn.currentOver + '.' + inn.currentBall;
  document.getElementById('sb-maxov').textContent = match.overs;
  document.getElementById('sb-bat').textContent = inn.batting;
  document.getElementById('sb-ext').textContent = inn.extras;

  // Run rate
  const totalDeliveries = inn.balls;
  const rr = totalDeliveries > 0 ? (inn.runs / (totalDeliveries / 6)).toFixed(2) : '0.00';
  document.getElementById('sb-rr').textContent = rr;

  // Innings toggle
  const inn1 = getInnings(mid, 1);
  const inn2 = getInnings(mid, 2);
  const toggleEl = document.getElementById('scorer-inns-toggle');
  if (inn1 && inn1.completed && inn2) {
    toggleEl.style.display = 'flex';
    document.getElementById('inns-btn-1').className = currentState.inningsNo === 1
      ? 'px-4 py-1.5 rounded-lg text-sm font-semibold transition bg-cyan-500 text-white'
      : 'px-4 py-1.5 rounded-lg text-sm font-semibold transition bg-gray-200 text-gray-500';
    document.getElementById('inns-btn-2').className = currentState.inningsNo === 2
      ? 'px-4 py-1.5 rounded-lg text-sm font-semibold transition bg-cyan-500 text-white'
      : 'px-4 py-1.5 rounded-lg text-sm font-semibold transition bg-gray-200 text-gray-500';
  } else {
    toggleEl.style.display = 'none';
  }

  // Batsmen
  const sId = inn.battingOrder[inn.strikerIdx];
  const nsId = inn.battingOrder[inn.nonStrikerIdx];
  const p = d.players || {};
  if (sId) {
    const s = inn.batsmanStats[sId] || { runs: 0, balls: 0, fours: 0, sixes: 0 };
    document.getElementById('sb-striker').innerHTML =
      '<span>' + (p[sId]?.name || 'Bat') + '<span class="text-xs text-blue-500 ml-1">*</span></span>' +
      '<span class="tabular-nums">' + s.runs + ' ' + s.balls + ' ' + s.fours + ' ' + s.sixes + '</span>';
  }
  if (nsId) {
    const ns = inn.batsmanStats[nsId] || { runs: 0, balls: 0, fours: 0, sixes: 0 };
    document.getElementById('sb-nonstriker').innerHTML =
      '<span>' + (p[nsId]?.name || 'Bat') + '</span>' +
      '<span class="tabular-nums">' + ns.runs + ' ' + ns.balls + ' ' + ns.fours + ' ' + ns.sixes + '</span>';
  }

  // Bowler
  if (inn.currentBowler) {
    const b = inn.bowlerStats[inn.currentBowler] || { runs: 0, wickets: 0, balls: 0 };
    document.getElementById('sb-bowler').textContent = p[inn.currentBowler]?.name || '?';
    const bo = Math.floor((b.balls || 0) / 6) + '.' + ((b.balls || 0) % 6);
    document.getElementById('sb-bowl-stats').textContent = bo + '-' + (b.wickets || 0) + '-' + (b.runs || 0);
  }

  // Over balls
  const obEl = document.getElementById('scorer-over');
  const obs = inn.overBalls || [];

  obEl.innerHTML = '<div class="text-xs text-gray-500 mb-1 font-medium">Over ' + (inn.currentOver + 1) + ':</div>';
  if (!obs.length) {
    obEl.innerHTML += '<div class="text-xs text-gray-400">No balls yet</div>';
  } else {
    obEl.innerHTML += '<div class="flex items-center gap-2 flex-wrap">' +
      obs.map(b => {
        let cls = 'run', lbl = String(b.runs);
        if (b.wicket) { cls = 'wicket'; lbl = 'W'; }
        else if (b.extraType === 'wide') { cls = 'wide'; lbl = 'WD' + (b.runs > 0 ? b.runs : ''); }
        else if (b.extraType === 'noball') { cls = 'noball'; lbl = 'NB' + (b.runs > 0 ? b.runs : ''); }
        else if (b.runs === 4) { cls = 'four'; lbl = '4'; }
        else if (b.runs === 6) { cls = 'six'; lbl = '6'; }
        else if (b.runs === 0) { lbl = '•'; }
        return '<span class="ball-dot ' + cls + '">' + lbl + '</span>';
      }).join('') + '</div>';
  }
}

function switchInnings(no) {
  if (currentState.inningsNo === no) return;
  const inn = getInnings(currentState.matchId, no);
  if (!inn) return;
  currentState.inningsNo = no;
  renderScorer();
}

// ─────── WHATSAPP SHARE ───────
function buildScoreMessage() {
  const mid = currentState.matchId;
  const d = load();
  const match = d.matches[mid];
  if (!match) return '';
  const inn1 = d.innings[mid + '_1'];
  const inn2 = d.innings[mid + '_2'];
  const lines = [];
  lines.push('🏏 *' + match.teamA + ' vs ' + match.teamB + '*');
  lines.push('━━━━━━━━━━━━━━━');
  if (inn1) {
    const ov1 = Math.floor(inn1.currentOver) + '.' + inn1.currentBall;
    const rr1 = inn1.balls > 0 ? (inn1.runs / (inn1.balls / 6)).toFixed(2) : '0.00';
    lines.push('*Innings 1:* ' + inn1.batting);
    lines.push('Score: ' + inn1.runs + '/' + inn1.wickets + ' (Ov ' + ov1 + '/' + match.overs + '.0, RR ' + rr1 + ')');
  }
  if (inn2 && inn1 && inn1.completed) {
    const ov2 = Math.floor(inn2.currentOver) + '.' + inn2.currentBall;
    const rr2 = inn2.balls > 0 ? (inn2.runs / (inn2.balls / 6)).toFixed(2) : '0.00';
    lines.push('*Innings 2:* ' + inn2.batting);
    lines.push('Score: ' + inn2.runs + '/' + inn2.wickets + ' (Ov ' + ov2 + '/' + match.overs + '.0, RR ' + rr2 + ')');
  }
  if (match.status === 'completed' && inn1 && inn2 && inn1.completed && inn2.completed) {
    lines.push('━━━━━━━━━━━━━━━');
    if (inn1.runs > inn2.runs) lines.push('🏆 *' + match.teamA + ' won!*');
    else if (inn2.runs > inn1.runs) lines.push('🏆 *' + match.teamB + ' won!*');
    else lines.push('🤝 *Match Tied!*');
  }
  lines.push('━━━━━━━━━━━━━━━');
  lines.push('📱 Cricket Scorer');
  return lines.join('\n');
}

function showWhatsAppShare() {
  const text = buildScoreMessage();
  if (!text) return;
  const link = document.getElementById('wa-link');
  link.href = 'https://wa.me/?text=' + encodeURIComponent(text);
  document.getElementById('wa-overlay').classList.add('open');
}

function hideWhatsAppShare() {
  document.getElementById('wa-overlay').classList.remove('open');
}

// ─────── SCORE RUNS ───────
function scoreRuns(runs) {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  if (inn.currentBall === 0 && inn.currentOver >= getMatch(mid).overs) return;
  if (inn.currentBall >= 6) return;

  const sId = inn.battingOrder[inn.strikerIdx];
  const nsId = inn.battingOrder[inn.nonStrikerIdx];

  const ball = {
    id: nextBallId(),
    inningsNo: currentState.inningsNo,
    over: inn.currentOver + 1,
    ballInOver: inn.currentBall + 1,
    runs, extras: 0, extraType: null,
    wicket: false, wicketType: null,
    strikerId: sId, nonStrikerId: nsId,
    bowlerId: inn.currentBowler,
    totalRuns: runs,
    timestamp: new Date().toISOString(),
  };

  inn.runs += runs;
  inn.balls += 1;
  inn.currentBall += 1;
  if (inn.currentBall === 6) { inn.currentOver += 1; inn.currentBall = 0; showWhatsAppShare(); }

  if (sId && inn.batsmanStats[sId]) {
    inn.batsmanStats[sId].runs += runs;
    inn.batsmanStats[sId].balls += 1;
    if (runs === 4) inn.batsmanStats[sId].fours += 1;
    if (runs === 6) inn.batsmanStats[sId].sixes += 1;
  }
  if (inn.currentBowler && inn.bowlerStats[inn.currentBowler]) {
    inn.bowlerStats[inn.currentBowler].runs += runs;
    inn.bowlerStats[inn.currentBowler].balls += 1;
  }

  // Strike rotation on odd runs
  if (runs % 2 === 1) {
    [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  }
  // End of over strike rotation
  if (inn.currentBall === 0 && inn.currentOver > 0) {
    [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  }

  inn.overBalls.push(ball);
  saveBall(mid, ball);
  saveInnings(mid, inn);
  renderScorer();
  checkInningsEnd();
}

    '</div>' +
    '<button onclick="extraWicket()" class="w-full btn-score btn-sm bg-red-50 text-red-700 border border-red-200">Wicket</button>';

}

}

function extraWicketType(type) {

function processExtra() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  if (inn.currentBall === 0 && inn.currentOver >= getMatch(mid).overs) return;

  const sId = inn.battingOrder[inn.strikerIdx];
  const nsId = inn.battingOrder[inn.nonStrikerIdx];
  const extraRun = 1 + (extraCtx.extraRuns || 0);

  const ball = {
    id: nextBallId(),
    inningsNo: currentState.inningsNo,
    over: inn.currentOver + 1,
    ballInOver: inn.currentBall + 1,
    runs: extraCtx.extraRuns || 0,
    extras: extraRun,
    extraType: extraCtx.type,
    wicket: extraCtx.wicket,
    wicketType: extraCtx.wicketType,
    strikerId: sId, nonStrikerId: nsId,
    bowlerId: inn.currentBowler,
    totalRuns: extraRun,
    timestamp: new Date().toISOString(),
  };

  inn.extras += extraRun;
  inn.runs += extraRun;
  // Ball NOT incremented for wides/noballs

  if (extraCtx.wicket) {
    inn.wickets += 1;
    if (sId && inn.batsmanStats[sId]) {
      inn.batsmanStats[sId].dismissed = true;
      inn.batsmanStats[sId].dismissalType = extraCtx.wicketType;
    }
    advanceBatsman(inn);
    if (inn.currentBowler && inn.bowlerStats[inn.currentBowler]) {
      inn.bowlerStats[inn.currentBowler].wickets += 1;
    }
  }

  // Strike rotation on odd bat runs
  if ((extraCtx.extraRuns || 0) % 2 === 1) {
    [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  }

  inn.overBalls.push(ball);
  saveBall(mid, ball);
  saveInnings(mid, inn);
  renderScorer();
  checkInningsEnd();
}

// ─────── WICKET ───────
function openWicketModal() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  if (inn.currentBall === 0 && inn.currentOver >= getMatch(mid).overs) return;
  if (inn.currentBall >= 6) return;

  document.getElementById('modal-title').textContent = 'Wicket';
  document.getElementById('modal-body').innerHTML =
    '<p class="text-sm text-gray-500 mb-3">Dismissal type?</p>' +
    '<div class="grid grid-cols-2 gap-2 mb-2">' +
      ['Bowled','Caught','LBW','Run Out','Stumped','Hit Wicket'].map(t =>
        '<button onclick="processWicket(\''+t+'\')" class="btn-score btn-sm bg-red-50 text-red-700 border border-red-200">'+t+'</button>'
      ).join('') +
    '</div>';
  document.getElementById('modal-overlay').classList.add('open');
}

function processWicket(type) {
  closeModal();
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  if (inn.currentBall >= 6) return;

  const sId = inn.battingOrder[inn.strikerIdx];
  const nsId = inn.battingOrder[inn.nonStrikerIdx];

  const ball = {
    id: nextBallId(),
    inningsNo: currentState.inningsNo,
    over: inn.currentOver + 1,
    ballInOver: inn.currentBall + 1,
    runs: 0, extras: 0, extraType: null,
    wicket: true, wicketType: type,
    strikerId: sId, nonStrikerId: nsId,
    bowlerId: inn.currentBowler,
    totalRuns: 0,
    timestamp: new Date().toISOString(),
  };

  inn.wickets += 1;
  inn.balls += 1;
  inn.currentBall += 1;
  if (inn.currentBall === 6) { inn.currentOver += 1; inn.currentBall = 0; showWhatsAppShare(); }

  if (sId && inn.batsmanStats[sId]) {
    inn.batsmanStats[sId].balls += 1;
    inn.batsmanStats[sId].dismissed = true;
    inn.batsmanStats[sId].dismissalType = type;
  }
  if (inn.currentBowler && inn.bowlerStats[inn.currentBowler]) {
    inn.bowlerStats[inn.currentBowler].balls += 1;
    inn.bowlerStats[inn.currentBowler].wickets += 1;
  }

  advanceBatsman(inn);

  // End of over strike rotation
  if (inn.currentBall === 0 && inn.currentOver > 0) {
    [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  }

  inn.overBalls.push(ball);
  saveBall(mid, ball);
  saveInnings(mid, inn);
  renderScorer();
  checkInningsEnd();
}

function advanceBatsman(inn) {
  while (inn.nextIdx < inn.battingOrder.length) {
    const nid = inn.battingOrder[inn.nextIdx];
    if (!inn.batsmanStats[nid]?.dismissed) {
      inn.strikerIdx = inn.nextIdx;
      inn.nextIdx++;
      return;
    }
    inn.nextIdx++;
  }
}

// ─────── END OVER ───────
function endOver() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  if (inn.currentBall === 0 && inn.currentOver === 0) return;
  if (inn.currentBall === 0) return;

  inn.currentOver += 1;
  inn.currentBall = 0;
  [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
  inn.overBalls = [];
  saveInnings(mid, inn);
  renderScorer();
  showWhatsAppShare();
  checkInningsEnd();
}

// ─────── UNDO ───────
function undoLast() {
  const mid = currentState.matchId;
  if (!getInnings(mid)) return;
  const last = popLastBall(mid);
  if (!last) return;
  recalculateInnings(mid);
  renderScorer();
}

function recalculateInnings(mid) {
  const d = load();
  const match = d.matches[mid];
  const innNo = currentState.inningsNo;
  const inn = getInnings(mid, innNo);
  const allBalls = d.balls[mid] || [];
  const balls = allBalls.filter(b => b.inningsNo === innNo);

  inn.runs = 0; inn.wickets = 0; inn.balls = 0; inn.extras = 0;
  inn.currentOver = 0; inn.currentBall = 0;
  inn.overBalls = [];

  Object.keys(inn.batsmanStats).forEach(id => {
    inn.batsmanStats[id] = { runs: 0, balls: 0, fours: 0, sixes: 0, dismissed: false, dismissalType: null };
  });
  Object.keys(inn.bowlerStats).forEach(id => {
    inn.bowlerStats[id] = { runs: 0, wickets: 0, balls: 0 };
  });

  inn.strikerIdx = 0;
  inn.nonStrikerIdx = 1;
  inn.nextIdx = 2;
  // If first player is already dismissed (shouldn't happen without balls), skip
  if (inn.battingOrder.length > 0 && inn.batsmanStats[inn.battingOrder[0]]?.dismissed) {
    inn.strikerIdx = -1;
    inn.nonStrikerIdx = -1;
    inn.nextIdx = 0;
  }

  const lastOverBalls = [];

  balls.forEach(ball => {
    inn.runs += ball.totalRuns || 0;
    if (ball.extras > 0) inn.extras += ball.extras;

    const isLegal = !ball.extraType;
    if (isLegal) {
      inn.balls += 1;
      inn.currentBall += 1;
      if (inn.currentBall === 6) { inn.currentOver += 1; inn.currentBall = 0; }
    }

    // Batsman stats
    if (ball.strikerId && inn.batsmanStats[ball.strikerId]) {
      inn.batsmanStats[ball.strikerId].runs += ball.runs || 0;
      if (isLegal) {
        inn.batsmanStats[ball.strikerId].balls += 1;
        if (ball.runs === 4) inn.batsmanStats[ball.strikerId].fours += 1;
        if (ball.runs === 6) inn.batsmanStats[ball.strikerId].sixes += 1;
      }
    }

    // Bowler stats
    if (ball.bowlerId && inn.bowlerStats[ball.bowlerId]) {
      inn.bowlerStats[ball.bowlerId].runs += ball.totalRuns || 0;
      if (isLegal) inn.bowlerStats[ball.bowlerId].balls += 1;
    }

    // Wicket
    if (ball.wicket) {
      inn.wickets += 1;
      if (ball.strikerId && inn.batsmanStats[ball.strikerId]) {
        inn.batsmanStats[ball.strikerId].dismissed = true;
        inn.batsmanStats[ball.strikerId].dismissalType = ball.wicketType;
      }
      if (ball.bowlerId && inn.bowlerStats[ball.bowlerId]) {
        inn.bowlerStats[ball.bowlerId].wickets += 1;
      }
      advanceBatsman(inn);
    }

    // Strike rotation on bat runs
    if ((ball.runs || 0) % 2 === 1) {
      [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
    }

    // End of over rotation
    if (isLegal && inn.currentBall === 0 && inn.currentOver > 0) {
      [inn.strikerIdx, inn.nonStrikerIdx] = [inn.nonStrikerIdx, inn.strikerIdx];
    }

    // Track last over balls
    if (ball.over === (inn.currentOver + 1) || (inn.currentOver === 0 && ball.over === 1)) {
      lastOverBalls.push(ball);
    }
  });

  inn.overBalls = lastOverBalls;
  if (inn.overBalls.length === 0 && balls.length > 0) {
    const lo = balls[balls.length - 1].over;
    inn.overBalls = balls.filter(b => b.over === lo);
  }

  saveInnings(mid, inn, innNo);
}

// ─────── CHANGE BOWLER ───────
function nextBowler() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn) return;
  const d = load();
  const mt = d.matchTeams[mid];
  if (!mt) return;
  // Innings 1: bowling team is Team B; Innings 2: bowling team is Team A
  const ids = inn.inningsNo === 1 ? (mt.xiB || mt.teamBIds || []) : (mt.xiA || mt.teamAIds || []);
  if (!ids.length) return;
  const idx = ids.indexOf(inn.currentBowler);
  inn.currentBowler = ids[(idx + 1) % ids.length];
  if (!inn.bowlerStats[inn.currentBowler]) {
    inn.bowlerStats[inn.currentBowler] = { runs: 0, wickets: 0, balls: 0 };
  }
  saveInnings(mid, inn);
  renderScorer();
}

// ─────── END INNINGS ───────
function endInnings() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  inn.completed = true;
  const d = load();
  saveInnings(mid, inn);

  // Check if innings 2 just ended → match complete
  if (currentState.inningsNo === 2) {
    d.matches[mid].status = 'completed';
    save(d);
    showWhatsAppShare();
    showView('home');
    renderHome();
    return;
  }

  // Innings 1 ended → auto-transition to innings 2
  d.matches[mid].status = 'ongoing';
  save(d);
  hideWhatsAppShare();
  ensureInningsTwo(mid);
  currentState.inningsNo = 2;
  renderScorer();
  alert('Innings 1 complete!\nNow batting: ' + inn.bowling + '\n\nTap "Share" to send score to WhatsApp group');
}

function checkInningsEnd() {
  const mid = currentState.matchId;
  const inn = getInnings(mid);
  if (!inn || inn.completed) return;
  const d = load();
  const match = d.matches[mid];
  if (!match) return;

  const active = inn.battingOrder.filter(id => !inn.batsmanStats[id]?.dismissed).length;
  const oversDone = inn.currentOver >= match.overs;

  if (active <= 1 || (oversDone && inn.currentBall === 0)) {
    if (currentState.inningsNo === 1) {
      endInnings(); // transitions to innings 2
    } else {
      endInnings(); // ends the match
    }
  }
}

// ─────── MODAL ───────
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ─────── HOME ───────
function renderHome() {
  const d = load();
  const matches = Object.values(d.matches || {}).sort((a, b) => (b.created || '').localeCompare(a.created || ''));
  const el = document.getElementById('home-match-list');
  if (!matches.length) {
    el.innerHTML = '<div class="bg-white rounded-xl p-6 text-center text-gray-400 text-sm border border-gray-200 shadow-sm">No matches yet. Create one!</div>';
    return;
  }
  el.innerHTML = matches.map(m => {
    const inn1 = d.innings[m.id + '_1'];
    const inn2 = d.innings[m.id + '_2'];
    const isOn = m.status === 'ongoing';
    const score1 = inn1 ? inn1.runs + '/' + inn1.wickets : '—';
    const ov1 = inn1 ? inn1.currentOver + '.' + inn1.currentBall : '—';
    const score2 = inn2 && inn1 && inn1.completed ? inn2.runs + '/' + inn2.wickets : null;
    const ov2 = inn2 && inn2.currentOver !== undefined ? inn2.currentOver + '.' + inn2.currentBall : null;
    return '<div onclick="openScorer(\'' + m.id + '\')" class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm flex items-center justify-between cursor-pointer active:scale-[0.98] transition">' +
      '<div><div class="font-semibold text-gray-900 text-sm">' + m.teamA + ' vs ' + m.teamB + '</div>' +
      '<div class="text-xs text-gray-500">' + m.id + ' &middot; ' + m.overs + ' ov &middot; <span class="' + (isOn ? 'text-green-600' : 'text-gray-400') + ' font-medium">' + m.status + '</span></div></div>' +
      '<div class="text-right"><div class="text-lg font-black ' + (isOn ? 'text-cyan-600' : 'text-gray-500') + '">' + score1 + (score2 ? ' & ' + score2 : '') + '</div>' +
      '<div class="text-xs text-gray-400">Ov ' + ov1 + (ov2 ? ' & ' + ov2 : '') + '</div></div></div>';
  }).join('');
}

// ─────── TEAM STATS ───────
function renderLeaderboard() {
  const d = load();
  const teams = {};
  Object.values(d.matches || {}).forEach(m => {
    [m.teamA, m.teamB].forEach(name => {
      if (!teams[name]) teams[name] = { played: 0, runs: 0, wkts: 0, balls: 0, won: 0 };
    });
    const inn1 = d.innings[m.id + '_1'];
    const inn2 = d.innings[m.id + '_2'];
    // Team A runs/wickets when batting
    if (inn1 && inn1.batting === m.teamA) {
      teams[m.teamA].runs += inn1.runs || 0;
      teams[m.teamA].wkts += inn1.wickets || 0;
      teams[m.teamA].balls += inn1.balls || 0;
    }
    if (inn2 && inn2.batting === m.teamA) {
      teams[m.teamA].runs += inn2.runs || 0;
      teams[m.teamA].wkts += inn2.wickets || 0;
      teams[m.teamA].balls += inn2.balls || 0;
    }
    // Team B runs/wickets when batting
    if (inn1 && inn1.batting === m.teamB) {
      teams[m.teamB].runs += inn1.runs || 0;
      teams[m.teamB].wkts += inn1.wickets || 0;
      teams[m.teamB].balls += inn1.balls || 0;
    }
    if (inn2 && inn2.batting === m.teamB) {
      teams[m.teamB].runs += inn2.runs || 0;
      teams[m.teamB].wkts += inn2.wickets || 0;
      teams[m.teamB].balls += inn2.balls || 0;
    }
    // Count match as played for both teams
    teams[m.teamA].played += 1;
    teams[m.teamB].played += 1;
    // Determine winner
    if (m.status === 'completed' && inn1 && inn1.completed && inn2 && inn2.completed) {
      if (inn1.runs > inn2.runs && inn1.batting) teams[inn1.batting].won += 1;
      else if (inn2.runs > inn1.runs && inn2.batting) teams[inn2.batting].won += 1;
    }
  });

  const sorted = Object.entries(teams).sort((a, b) => b[1].won - a[1].won || b[1].runs - a[1].runs);
  const el = document.getElementById('lb-teams');
  if (!sorted.length) {
    el.innerHTML = '<div class="bg-white rounded-xl p-6 text-center text-gray-400 text-sm border border-gray-200 shadow-sm">No data yet</div>';
    return;
  }
  el.innerHTML = sorted.map(([name, s]) => {
    const rr = s.balls > 0 ? (s.runs / (s.balls / 6)).toFixed(2) : '—';
    return '<div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">' +
      '<div class="flex items-center justify-between">' +
        '<span class="font-bold text-gray-900">' + name + '</span>' +
        '<span class="text-xs text-gray-400">' + s.played + ' match' + (s.played > 1 ? 'es' : '') + '</span>' +
      '</div>' +
      '<div class="flex gap-4 mt-2 text-sm">' +
        '<div><span class="text-gray-400 text-xs">Runs</span><div class="font-bold text-cyan-600 tabular-nums">' + s.runs + '</div></div>' +
        '<div><span class="text-gray-400 text-xs">Wkts</span><div class="font-bold text-red-500 tabular-nums">' + s.wkts + '</div></div>' +
        '<div><span class="text-gray-400 text-xs">RR</span><div class="font-bold text-gray-700 tabular-nums">' + rr + '</div></div>' +
        '<div><span class="text-gray-400 text-xs">Won</span><div class="font-bold text-emerald-600 tabular-nums">' + s.won + '</div></div>' +
      '</div></div>';
  }).join('');
}

// ─────── TEAM PRESETS ───────
function getTeamPresets(d) {
  d = d || load();
  if (!d.teamPresets) d.teamPresets = [];
  return d.teamPresets;
}
function addTeamPreset(d, name) {
  if (!name) return;
  const presets = getTeamPresets(d);
  if (!presets.includes(name)) {
    presets.push(name);
    d.teamPresets = presets;
    save(d);
  }
}
function removeTeamPreset(name) {
  const d = load();
  d.teamPresets = (d.teamPresets || []).filter(n => n !== name);
  save(d);
  populateTeamPresets();
  closeModal();
  openManageTeamsModal();
}
function populateTeamPresets() {
  const d = load();
  const presets = getTeamPresets(d);
  const datalist = document.getElementById('team-presets');
  datalist.innerHTML = presets.map(n => '<option value="' + n.replace(/"/g,'&quot;') + '">').join('');
  const chips = document.getElementById('setup-team-presets');
  if (presets.length) {
    chips.style.display = 'flex';
    chips.innerHTML = presets.map(n =>
      '<span class="xi-chip" onclick="document.getElementById(\'setup-ta\').value=\'' + n.replace(/'/g,"\\'") + '\'">' + n + '</span>'
    ).join('');
  } else {
    chips.style.display = 'none';
  }
}
function openManageTeamsModal() {
  const d = load();
  const presets = getTeamPresets(d);
  document.getElementById('modal-title').textContent = 'Manage Teams';
  document.getElementById('modal-body').innerHTML =
    '<div class="space-y-2 mb-3">' +
      (presets.length
        ? presets.map(n =>
            '<div class="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2">' +
              '<span class="text-sm font-medium text-gray-700">' + n + '</span>' +
              '<button onclick="removeTeamPreset(\'' + n.replace(/'/g,"\\'") + '\')" class="text-red-400 text-sm hover:text-red-600">✕</button>' +
            '</div>'
          ).join('')
        : '<div class="text-gray-400 text-sm text-center">No saved teams</div>') +
    '</div>' +
    '<div class="flex gap-2">' +
      '<input id="new-team-name" placeholder="New team name" class="text-sm flex-1">' +
      '<button onclick="addTeamPreset(load(),document.getElementById(\'new-team-name\').value.trim());populateTeamPresets();closeModal();openManageTeamsModal()" class="btn-score btn-sm bg-cyan-50 text-cyan-700 border border-cyan-200 font-semibold px-4">+ Add</button>' +
    '</div>';
  document.getElementById('modal-overlay').classList.add('open');
}

// ─────── SETTINGS ───────
function openSettingsModal() {
  document.getElementById('modal-title').textContent = '⚙️ Settings';
  document.getElementById('modal-body').innerHTML =
    '<button onclick="closeModal();openManageTeamsModal()" class="w-full btn-score btn-sm bg-blue-50 text-blue-700 border border-blue-200 font-semibold mb-2">🏷️ Manage team presets</button>' +
    '<button onclick="sendCompletedToWhatsApp();closeModal()" class="w-full btn-score btn-sm bg-green-50 text-green-700 border border-green-200 font-semibold mb-2">📱 Send completed matches to WhatsApp</button>' +
    '<button onclick="deleteCompletedMatches()" class="w-full btn-score btn-sm bg-red-50 text-red-700 border border-red-200 font-semibold">🗑️ Delete all completed match data</button>';
  document.getElementById('modal-overlay').classList.add('open');
}

function sendCompletedToWhatsApp() {
  const d = load();
  const completed = Object.values(d.matches || {}).filter(m => m.status === 'completed');
  if (!completed.length) return;
  const lines = ['🏏 *Completed Matches*', '━━━━━━━━━━━━━━━'];
  completed.forEach(m => {
    const inn1 = d.innings[m.id + '_1'];
    const inn2 = d.innings[m.id + '_2'];
    lines.push('*' + m.teamA + ' vs ' + m.teamB + '*');
    if (inn1) lines.push('Inn1: ' + inn1.runs + '/' + inn1.wickets + ' (' + inn1.batting + ')');
    if (inn2) lines.push('Inn2: ' + inn2.runs + '/' + inn2.wickets + ' (' + inn2.batting + ')');
    if (inn1 && inn2 && inn1.completed && inn2.completed) {
      if (inn1.runs > inn2.runs) lines.push('🏆 *' + inn1.batting + ' won*');
      else if (inn2.runs > inn1.runs) lines.push('🏆 *' + inn2.batting + ' won*');
      else lines.push('🤝 Tied');
    }
    lines.push('━━━━━━━━━━━━━━━');
  });
  const text = lines.join('\n');
  const link = document.getElementById('wa-link');
  link.href = 'https://wa.me/?text=' + encodeURIComponent(text);
  document.getElementById('wa-overlay').classList.add('open');
}

function deleteCompletedMatches() {
  if (!confirm('Delete all completed match data? This cannot be undone.')) return;
  const d = load();
  Object.keys(d.matches || {}).forEach(mid => {
    if (d.matches[mid].status === 'completed') {
      delete d.matches[mid];
      delete d.matchTeams[mid];
      delete d.innings[mid + '_1'];
      delete d.innings[mid + '_2'];
      delete d.balls[mid];
    }
  });
  save(d);
  closeModal();
  renderHome();
}

// ─────── MIGRATION ───────
function migrateOldData() {
  const d = load();
  let changed = false;
  // Old format: d.innings[mid] = innings object (with inningsNo: 1)
  // New format: d.innings[mid + '_1'] and d.innings[mid + '_2']
  Object.keys(d.innings || {}).forEach(key => {
    const inn = d.innings[key];
    if (inn && inn.matchId && !key.includes('_')) {
      const mid = key;
      const newKey = mid + '_' + (inn.inningsNo || 1);
      if (!d.innings[newKey]) {
        d.innings[newKey] = inn;
        delete d.innings[key];
        changed = true;
      }
    }
  });
  if (changed) save(d);
}
migrateOldData();

// ─────── INIT ───────
renderHome();
</script>
